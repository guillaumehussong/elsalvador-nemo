<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Focus group — Salvador Personas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=IBM+Plex+Sans:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="/style.css?v=2" />
  </head>
  <body>
    <header class="header">
      <div class="header-title">
        <h1 data-i18n="h1">Focus group virtual</h1>
        <p class="subtitle" data-i18n="subtitle">Reacciones B2C · personas Nemotron · El Salvador</p>
      </div>
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" class="lang-btn" data-lang="es">ES</button>
        <button type="button" class="lang-btn" data-lang="en">EN</button>
      </div>
    </header>
    <main class="page">
      <details class="intro panel">
        <summary class="intro-summary" data-i18n="intro_summary">¿Qué es esto?</summary>
        <div class="intro-body">
          <p class="intro-lead" data-i18n="intro_lead"></p>
          <ul class="intro-list">
            <li data-i18n="intro_li1"></li>
            <li data-i18n="intro_li2"></li>
            <li data-i18n="intro_li3"></li>
          </ul>
          <p class="intro-note" data-i18n="intro_note"></p>
        </div>
      </details>

      <form id="focusForm" class="panel">
        <h2 class="form-title" data-i18n="form_title">Configurar una corrida</h2>

        <label class="field">
          <span class="field-label">
            <span data-i18n="stimulus_label">Estímulo (anuncio / hook / precio)</span>
            <span class="info-wrap">
              <button
                type="button"
                class="info-btn"
                aria-label="Help: stimulus"
                aria-expanded="false"
                aria-controls="help-stimulus"
                data-help="help-stimulus"
              >
                i
              </button>
              <span id="help-stimulus" class="info-popover" role="tooltip" data-i18n="help_stimulus"></span>
            </span>
          </span>
          <textarea
            id="stimulus"
            rows="5"
            required
            data-i18n-placeholder="stimulus_placeholder"
            placeholder="Ej. Suscripción $10/mes, acceso ilimitado a clases de yoga prenatal en Antiguo Cuscatlán…"
          ></textarea>
        </label>

        <div class="row">
          <label class="field">
            <span class="field-label">
              <span data-i18n="n_label">N personas</span>
              <span class="info-wrap">
                <button
                  type="button"
                  class="info-btn"
                  aria-label="Help: N personas"
                  aria-expanded="false"
                  aria-controls="help-n"
                  data-help="help-n"
                >
                  i
                </button>
                <span id="help-n" class="info-popover" role="tooltip" data-i18n="help_n"></span>
              </span>
            </span>
            <input id="n" type="number" min="1" max="25" value="8" />
          </label>
          <label class="field">
            <span class="field-label">
              <span data-i18n="seed_label">Seed (opcional)</span>
              <span class="info-wrap">
                <button
                  type="button"
                  class="info-btn"
                  aria-label="Help: seed"
                  aria-expanded="false"
                  aria-controls="help-seed"
                  data-help="help-seed"
                >
                  i
                </button>
                <span id="help-seed" class="info-popover" role="tooltip" data-i18n="help_seed"></span>
              </span>
            </span>
            <input id="seed" type="number" placeholder="42" />
          </label>
        </div>

        <label class="field">
          <span class="field-label">
            <span data-i18n="dept_label">Departamento (opcional)</span>
            <span class="info-wrap">
              <button
                type="button"
                class="info-btn"
                aria-label="Help: department"
                aria-expanded="false"
                aria-controls="help-department"
                data-help="help-department"
              >
                i
              </button>
              <span id="help-department" class="info-popover" role="tooltip" data-i18n="help_department"></span>
            </span>
          </span>
          <input id="department" type="text" placeholder="San Salvador" />
        </label>

        <div class="actions">
          <button type="button" id="estimateBtn" class="btn secondary" data-i18n="estimate_btn">
            Estimar el costo
          </button>
          <button type="submit" id="runBtn" class="btn primary" data-i18n="run_btn">
            Lanzar el focus group
          </button>
          <span class="info-wrap actions-info">
            <button
              type="button"
              class="info-btn"
              aria-label="Help: actions"
              aria-expanded="false"
              aria-controls="help-actions"
              data-help="help-actions"
            >
              i
            </button>
            <span id="help-actions" class="info-popover" role="tooltip" data-i18n="help_actions"></span>
          </span>
        </div>

        <p id="confirmHint" class="hint hidden">
          <span data-i18n="confirm_hint"></span>
          <label class="confirm">
            <input id="confirm" type="checkbox" />
            <span data-i18n="confirm_label">Confirmo</span>
          </label>
          <span class="info-wrap confirm-info">
            <button
              type="button"
              class="info-btn"
              aria-label="Help: confirmation"
              aria-expanded="false"
              aria-controls="help-confirm"
              data-help="help-confirm"
            >
              i
            </button>
            <span id="help-confirm" class="info-popover" role="tooltip" data-i18n="help_confirm"></span>
          </span>
        </p>
      </form>

      <section id="estimatePanel" class="panel hidden" aria-live="polite"></section>
      <section id="resultPanel" class="panel hidden" aria-live="polite"></section>
      <p id="error" class="error hidden" role="alert"></p>
    </main>
    <footer class="footer" data-i18n="footer"></footer>
    <script src="/i18n.js?v=2"></script>
    <script src="/app.js?v=2"></script>
  </body>
</html>
